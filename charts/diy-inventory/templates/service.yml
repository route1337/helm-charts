apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.config.serviceName }}-db
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Values.config.serviceName }}-db
spec:
  selector:
    app: {{ .Values.config.serviceName }}-db
  ports:
    - name: mysql
      port: 3306
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.config.serviceName }}-ui
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Values.config.serviceName }}
spec:
  selector:
    app: {{ .Values.config.serviceName }}-ui
  ports:
    - name: http
      port: 8080
