{{- if .Values.config.enableNetworkPolicy }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Values.config.serviceName }}-db-lockdown
  namespace: {{ .Release.Namespace }}
spec:
  podSelector:
    matchLabels:
      app: "{{ .Values.config.serviceName}}-db"
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: "{{ .Values.config.serviceName}}-ui"
      ports:
        - protocol: TCP
          port: 3306
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Values.config.serviceName }}-ui-lockdown
  namespace: {{ .Release.Namespace }}
spec:
  podSelector:
    matchLabels:
      app: "{{ .Values.config.serviceName}}-ui"
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchExpressions:
              - key: kubernetes.io/metadata.name
                operator: In
                values: [ "ingress-nginx", "cloudflare" ]
      ports:
        - protocol: TCP
          port: 8080
{{- end }}
